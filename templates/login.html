<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flujo Ventas — Espacio Electrónica</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: light; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { background: #fff; border: 1px solid #e2e5ea; border-radius: 14px; padding: 36px 32px;
    width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
  .logo { font-size: 17px; font-weight: 700; color: #1F3864; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #5a6270; margin-bottom: 24px; }
  label { display: block; font-size: 12px; color: #5a6270; font-weight: 500; margin-bottom: 5px; }
  input { width: 100%; height: 38px; padding: 0 12px; border: 1px solid #e2e5ea; border-radius: 8px;
    font-size: 14px; margin-bottom: 16px; outline: none; }
  input:focus { border-color: #1F3864; }
  button { width: 100%; height: 40px; border-radius: 8px; border: none; background: #1F3864;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #2E5090; }
  #error { color: #9b1c1c; font-size: 13px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
  <form class="box" id="form-login">
    <div class="logo">Flujo Ventas</div>
    <div class="sub">Espacio Electrónica</div>
    <div id="error"></div>
    <label>Usuario</label>
    <input type="text" id="usuario" autocomplete="username" required>
    <label>Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit">Ingresar</button>
  </form>
<script>
document.getElementById("form-login").addEventListener("submit", async (e) => {
  e.preventDefault();
  const usuario = document.getElementById("usuario").value.trim();
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");
  errorBox.style.display = "none";
  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, password })
    });
    const data = await r.json();
    if (!r.ok) {
      errorBox.textContent = data.error || "Error al iniciar sesión";
      errorBox.style.display = "block";
      return;
    }
    window.location = "/";
  } catch (err) {
    errorBox.textContent = "No se pudo conectar con el servidor.";
    errorBox.style.display = "block";
  }
});
</script>
</body>
</html>
